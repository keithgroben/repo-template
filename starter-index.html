<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Name</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/preact@10/dist/preact.umd.js"></script>
    <script src="https://unpkg.com/preact@10/hooks/dist/hooks.umd.js"></script>
    <script src="https://unpkg.com/htm@3/preact/index.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .fade-up { animation: fadeUp 0.35s ease-out both; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

<div id="app"></div>
<div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

<script type="module">
// ─── Preact Shim ─────────────────────────────────────────
// In a multi-file app, this would be public/lib/preact.js
const { h, render, Component } = window.preact;
const { useState, useEffect, useRef, useCallback, useMemo } = window.preactHooks;
const { html } = window.htmPreact;

// ─── Toast System (imperative, outside Preact) ──────────
const Toast = {
    show(message, type = 'success', duration = 3500) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        const colors = {
            success: 'bg-emerald-600',
            error: 'bg-red-600',
            info: 'bg-blue-600',
            warning: 'bg-amber-500 text-gray-900',
        };
        toast.className = `${colors[type] || colors.info} text-white px-4 py-2.5 rounded-lg shadow-lg text-sm font-medium max-w-sm`;
        toast.style.animation = 'slideIn 0.25s ease-out';
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.animation = 'slideOut 0.2s ease-in forwards';
            toast.addEventListener('animationend', () => toast.remove());
        }, duration);
    },
    success(msg) { this.show(msg, 'success'); },
    error(msg) { this.show(msg, 'error'); },
    info(msg) { this.show(msg, 'info'); },
    warning(msg) { this.show(msg, 'warning'); },
};
window.Toast = Toast;

// ─── Shared Components ──────────────────────────────────
// In a multi-file app, each of these would be in public/components/

function Badge({ label, colorMap }) {
    const DEFAULT_COLORS = {
        'Active':    { bg: 'bg-emerald-50',  text: 'text-emerald-700' },
        'Inactive':  { bg: 'bg-gray-100',    text: 'text-gray-500' },
        'Pending':   { bg: 'bg-amber-50',    text: 'text-amber-700' },
        'Error':     { bg: 'bg-red-50',      text: 'text-red-700' },
    };
    const colors = colorMap || DEFAULT_COLORS;
    const c = colors[label] || { bg: 'bg-gray-100', text: 'text-gray-600' };
    return html`
        <span class="inline-flex items-center px-2 py-0.5 rounded-md text-[11px] font-semibold tracking-wide ${c.bg} ${c.text}">
            ${label}
        </span>
    `;
}

function InfoCard({ icon, label, value, sub }) {
    return html`
        <div class="bg-white rounded-xl border border-gray-100 p-5 shadow-sm hover:shadow-md transition-shadow duration-200">
            <div class="flex items-center gap-2 mb-1">
                ${icon && html`<span class="text-lg">${icon}</span>`}
                <span class="text-[11px] font-semibold uppercase tracking-widest text-gray-400">${label}</span>
            </div>
            <div class="text-2xl font-bold text-gray-900 tracking-tight">${value}</div>
            ${sub && html`<div class="text-xs text-gray-500 mt-1">${sub}</div>`}
        </div>
    `;
}

function LoadingSkeleton({ lines = 3, className = '' }) {
    return html`
        <div class="space-y-3 ${className}">
            ${Array.from({ length: lines }, (_, i) => html`
                <div key=${i} class="h-4 bg-gray-200 rounded-lg animate-pulse"
                     style="width: ${85 - (i * 15)}%"></div>
            `)}
        </div>
    `;
}

function ConfirmDialog({ open, title, message, confirmLabel, onConfirm, onCancel }) {
    if (!open) return null;
    return html`
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm"
             onClick=${(e) => { if (e.target === e.currentTarget) onCancel(); }}>
            <div class="bg-white rounded-2xl shadow-xl p-6 max-w-sm w-full mx-4 fade-up">
                <h3 class="text-lg font-bold text-gray-900 mb-2">${title || 'Confirm'}</h3>
                <p class="text-sm text-gray-600 mb-6">${message || 'Are you sure?'}</p>
                <div class="flex gap-3 justify-end">
                    <button onClick=${onCancel}
                            class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 rounded-lg hover:bg-gray-100 transition-colors">
                        Cancel
                    </button>
                    <button onClick=${onConfirm}
                            class="px-4 py-2 text-sm font-semibold text-white bg-red-600 hover:bg-red-700 rounded-lg transition-colors shadow-sm">
                        ${confirmLabel || 'Confirm'}
                    </button>
                </div>
            </div>
        </div>
    `;
}

function EmptyState({ icon, title, message, actionLabel, onAction }) {
    return html`
        <div class="flex flex-col items-center justify-center py-16 text-center">
            ${icon && html`<div class="text-4xl mb-3">${icon}</div>`}
            <h3 class="text-lg font-semibold text-gray-900 mb-1">${title || 'Nothing here yet'}</h3>
            ${message && html`<p class="text-sm text-gray-500 max-w-xs">${message}</p>`}
            ${actionLabel && html`
                <button onClick=${onAction}
                        class="mt-4 px-4 py-2 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors shadow-sm">
                    ${actionLabel}
                </button>
            `}
        </div>
    `;
}

// ─── Views ──────────────────────────────────────────────
// In a multi-file app, each of these would be in public/views/

function HomeView() {
    const [loading, setLoading] = useState(true);

    useEffect(() => {
        // Simulate data loading — replace with real Supabase query
        setTimeout(() => setLoading(false), 600);
    }, []);

    if (loading) return html`
        <div class="max-w-5xl mx-auto p-6">
            <${LoadingSkeleton} lines=${4} />
        </div>
    `;

    const stats = [
        { icon: '📦', label: 'Total Items', value: '142', sub: '+12 this week' },
        { icon: '✅', label: 'Active', value: '98', sub: '69% of total' },
        { icon: '⏳', label: 'Pending', value: '31', sub: 'Awaiting review' },
        { icon: '🚨', label: 'Errors', value: '3', sub: 'Needs attention' },
    ];

    return html`
        <div class="max-w-5xl mx-auto p-6">
            <div class="mb-8">
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Dashboard</h1>
                <p class="text-sm text-gray-500 mt-1">Overview of your workspace</p>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                ${stats.map((s, i) => html`
                    <div key=${i} class="fade-up" style="animation-delay: ${i * 60}ms">
                        <${InfoCard} ...${s} />
                    </div>
                `)}
            </div>

            <div class="bg-white rounded-xl border border-gray-100 shadow-sm">
                <div class="p-5 border-b border-gray-100 flex items-center justify-between">
                    <h2 class="text-sm font-semibold text-gray-900">Recent Items</h2>
                    <${Badge} label="Active" />
                </div>
                <div class="p-5">
                    <p class="text-sm text-gray-500">
                        Replace this with a real data table.
                        <a href="#detail/123" class="text-blue-600 hover:underline ml-1">View example detail →</a>
                    </p>
                </div>
            </div>
        </div>
    `;
}

function DetailView({ id }) {
    return html`
        <div class="max-w-3xl mx-auto p-6 fade-up">
            <a href="#home" class="inline-flex items-center gap-1 text-sm text-gray-500 hover:text-gray-900 mb-4 transition-colors">
                ← Back to dashboard
            </a>
            <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6">
                <h1 class="text-xl font-bold text-gray-900 mb-2">Detail View</h1>
                <p class="text-sm text-gray-500 mb-4">Viewing item <strong>${id}</strong></p>
                <${Badge} label="Active" />
            </div>
        </div>
    `;
}

// ─── App Shell & Router ─────────────────────────────────
function App() {
    const [route, setRoute] = useState(location.hash.slice(1) || 'home');

    useEffect(() => {
        const handler = () => setRoute(location.hash.slice(1) || 'home');
        window.addEventListener('hashchange', handler);
        return () => window.removeEventListener('hashchange', handler);
    }, []);

    const [view, param] = route.includes('/')
        ? [route.split('/')[0], route.split('/')[1]]
        : [route, null];

    const renderView = () => {
        switch (view) {
            case 'detail': return html`<${DetailView} id=${param} />`;
            default:       return html`<${HomeView} />`;
        }
    };

    return html`
        <div class="min-h-screen">
            <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
                <a href="#home" class="text-base font-bold text-gray-900 tracking-tight hover:text-blue-600 transition-colors">
                    App Name
                </a>
                <nav class="flex items-center gap-4">
                    <a href="#home" class="text-sm ${view === 'home' ? 'text-gray-900 font-semibold' : 'text-gray-500 hover:text-gray-900'} transition-colors">
                        Home
                    </a>
                </nav>
            </header>
            <main>
                ${renderView()}
            </main>
        </div>
    `;
}

render(html`<${App} />`, document.getElementById('app'));
</script>

</body>
</html>
