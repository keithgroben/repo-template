# ─── Docker Compose Template ──────────────────────────────
# Each app runs as a single Hono container on r7net.
# Global Caddy (on the host) handles TLS, routing, and path-prefix stripping.
# Do NOT add a Caddy service here — there is no per-app Caddyfile.
#
# Usage:
#   docker compose up -d            # Start the container
#   docker compose logs -f app      # Tail logs
#   docker compose down             # Stop the container
#   docker compose up -d --build    # Rebuild and restart

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-name          # ← Change to your app name (e.g., porkchop, cb-forms)
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - r7net
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  r7net:
    external: true
