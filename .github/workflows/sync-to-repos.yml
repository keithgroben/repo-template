name: Sync template files to downstream repos

on:
  push:
    branches: [main]
    paths:
      - 'PROJECT_PROTOCOL.md'
      - 'docs/architecture-patterns.md'
      - 'docs/branching.md'
      - 'docs/versioning.md'
      - 'docs/secrets.md'
      - '.github/sync-config.json'

  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo-template
        uses: actions/checkout@v4

      - name: Sync files to downstream repos
        env:
          GH_TOKEN: ${{ secrets.REPO_SYNC_TOKEN }}
        shell: bash
        run: |
          set -e
          BRANCH="sync/repo-template-$(date +%Y%m%d)"
          COMMIT_MSG="Sync from repo-template ($(date +%Y-%m-%d))"

          FILES=$(jq -r '.files[]' .github/sync-config.json)
          REPOS=$(jq -r '.repos[]' .github/sync-config.json)

          for REPO in $REPOS; do
            echo "=== $REPO ==="
            CLONE_DIR="/tmp/sync-$(echo $REPO | tr '/' '-')"
            rm -rf "$CLONE_DIR"

            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" "$CLONE_DIR" 2>/dev/null || {
              echo "  SKIP: clone failed"
              continue
            }

            CHANGED=false
            UPDATED_LIST=""
            for FILE in $FILES; do
              if [ -f "$FILE" ]; then
                mkdir -p "$CLONE_DIR/$(dirname $FILE)"
                if [ ! -f "$CLONE_DIR/$FILE" ] || ! diff -q "$FILE" "$CLONE_DIR/$FILE" > /dev/null 2>&1; then
                  cp "$FILE" "$CLONE_DIR/$FILE"
                  CHANGED=true
                  UPDATED_LIST="${UPDATED_LIST}- ${FILE}\n"
                  echo "  Updated: $FILE"
                fi
              fi
            done

            if [ "$CHANGED" = false ]; then
              echo "  No changes"
              rm -rf "$CLONE_DIR"
              continue
            fi

            cd "$CLONE_DIR"
            git config user.name "repo-template-sync"
            git config user.email "sync@your-domain.com"
            git checkout -b "$BRANCH" 2>/dev/null || {
              echo "  SKIP: branch exists"
              cd /
              rm -rf "$CLONE_DIR"
              continue
            }
            git add -A
            git commit -m "$COMMIT_MSG" || { cd /; rm -rf "$CLONE_DIR"; continue; }
            git push origin "$BRANCH" 2>/dev/null || { echo "  SKIP: push failed"; cd /; rm -rf "$CLONE_DIR"; continue; }

            PR_BODY="Automated sync of shared files from [repo-template](https://github.com/your-username/repo-template)."
            gh pr create --repo "$REPO" --base main --head "$BRANCH" --title "Sync from repo-template" --body "$PR_BODY" 2>/dev/null || echo "  PR exists or failed"

            cd /
            rm -rf "$CLONE_DIR"
            echo "  Done"
          done
